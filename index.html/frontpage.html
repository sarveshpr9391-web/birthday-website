<!DOCTYPE html>
<html>
<head>
<title>Special Note</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial;
    text-align:center;
}

.box{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#ff4081;
color:white;
cursor:pointer;
}

button:hover{
background:#e73370;
}
</style>
</head>

<body>

<div class="box">
<h1>💌 A Special Note</h1>
<p>This message is from your brother ❤️</p>

<a href="index.html">
<button>Open Your Surprise 🎁</button>
</a>

</div>

</body>
</html>
